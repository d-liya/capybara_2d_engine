<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Capybara Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist+Mono:ital,wght@0,100..900;1,100..900&family=Geist+Pixel&family=Geist:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/x-icon"
      href="https://www.capybara.build/favicon.ico"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="https://www.capybara.build/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="https://www.capybara.build/favicon-16x16.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="https://www.capybara.build/apple-touch-icon.png"
    />
    <link rel="manifest" href="https://www.capybara.build/site.webmanifest" />
    <link rel="stylesheet" href="dist/styles.css" />
  </head>
  <body>
    <div id="game-shell">
      <canvas id="game"></canvas>
      <div id="hud-root"></div>
    </div>
    <script type="module" src="dist/main.js"></script>
    <script src="https://assets.capybara.build/js/game-api-client.js"></script>
    <style>
      /* Add overrides here */
      * {
        cursor:
          url("https://assets.capybara.build/ui-icons/hand_point.svg") 6 2,
          pointer !important;
      }
    </style>
  </body>
</html>
